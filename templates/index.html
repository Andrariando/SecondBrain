<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Second Brain Wiki</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="/static/index.css">
</head>
<body>

<div class="sidebar">
    <h2>Second Brain</h2>
    <div class="nav-item active" onclick="loadView('dashboard')">Dashboard</div>
    <div class="nav-item" onclick="loadView('knowledge')">Knowledge Wiki</div>
    <div class="nav-item" onclick="loadView('chat')">Chat History</div>
    <div class="nav-item" onclick="loadView('action_item')">Action Items</div>
    <div class="nav-item" onclick="loadView('idea')">Ideas</div>
    <div class="nav-item" onclick="loadView('upload')">Upload Document</div>
</div>

<div class="main-content">
    
    <!-- Dashboard View -->
    <div id="view-dashboard" class="view-section">
        <h1 style="margin-bottom: 2rem;">Overview</h1>
        <div class="stats-grid" id="stats-container">
            <!-- Populated via JS -->
        </div>
        <h2 style="margin-bottom: 1.5rem;">Recent Activity</h2>
        <div class="memories-grid" id="recent-memories">
            <!-- Populated via JS -->
        </div>
    </div>

    <!-- Filtered Views -->
    <div id="view-filtered" class="view-section hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h1 id="filtered-title" style="margin: 0; text-transform: capitalize;">Wiki</h1>
            <input type="text" id="search-input" placeholder="Search..." onkeyup="filterMemories()" style="padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid var(--border-color); background: rgba(30, 41, 59, 0.4); color: white; width: 300px; backdrop-filter: blur(12px); outline: none;">
        </div>
        <div class="memories-grid" id="filtered-memories">
            <!-- Populated via JS -->
        </div>
    </div>

    <!-- Upload View -->
    <div id="view-upload" class="view-section hidden">
        <h1 style="margin-bottom: 2rem;">Upload Knowledge</h1>
        <div class="upload-section">
            <h3 style="margin-top: 0">Upload a PDF or Text Document</h3>
            <p style="color: var(--text-secondary); margin-bottom: 2rem;">The AI will automatically read, extract text, summarize, and categorize your document into the knowledge base.</p>
            <input type="file" id="file-input" accept=".pdf,.txt,.md" style="margin-bottom: 1rem;">
            <br>
            <button class="upload-btn" onclick="uploadFile()">Upload & Process</button>
            <p id="upload-status" style="margin-top: 1rem; font-weight: 500;"></p>
        </div>
    </div>

    <!-- Split-Screen Article View -->
    <div id="view-article" class="view-section hidden article-view-container">
        <div class="article-header">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <button class="back-btn" onclick="closeArticle()">&larr; Back to Wiki</button>
                <span id="article-type" class="memory-type"></span>
                <span id="article-date" style="color: var(--text-secondary); font-size: 0.875rem;"></span>
            </div>
        </div>
        
        <div class="split-layout" id="article-split-layout">
            <!-- Left Pane: Markdown -->
            <div class="article-pane markdown-pane">
                <h1 id="article-title" class="modal-title" style="margin-top: 1rem;"></h1>
                <div id="article-body" class="markdown-body"></div>
            </div>
            
            <!-- Right Pane: PDF Embed -->
            <div class="article-pane pdf-pane" id="pdf-pane">
                <iframe id="pdf-iframe" src="" style="width: 100%; height: 100%; border: none; border-radius: 8px; background: white;"></iframe>
            </div>
        </div>
    </div>

</div>

<script src="/static/app.js"></script>
</body>
</html>
